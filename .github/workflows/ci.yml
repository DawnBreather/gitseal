name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: '1.26'
          check-latest: true

      - name: Verify module deps
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum || {
            echo "::error::go.mod/go.sum not tidy — run 'go mod tidy' and commit"; exit 1;
          }

      - name: Verify gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: '1.26'
          check-latest: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

  images:
    name: build images (no push)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: sealdbroker,        dockerfile: Dockerfile }
          - { name: gitseal-controller, dockerfile: Dockerfile.controller }
          - { name: seald-materialize,  dockerfile: Dockerfile.materialize }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
