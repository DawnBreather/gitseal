name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  images:
    name: build · push · attest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: sealdbroker,        dockerfile: Dockerfile }
          - { name: gitseal-controller, dockerfile: Dockerfile.controller }
          - { name: seald-materialize,  dockerfile: Dockerfile.materialize }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # OCI names must be lowercase; github.repository may carry uppercase.
      - name: Lowercase repo
        id: repo
        run: echo "lc=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0
      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96 # v5.6.1
        with:
          images: ghcr.io/${{ steps.repo.outputs.lc }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Build and push ${{ matrix.name }}
        id: build
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-name: ghcr.io/${{ steps.repo.outputs.lc }}/${{ matrix.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  cli:
    name: sealdctl binaries (GoReleaser)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach binaries/archives/checksums to the GitHub Release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0   # GoReleaser needs full history + tags for the changelog
      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  chart:
    name: helm chart (OCI → GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.16.4
      - name: Package + push chart to GHCR
        env:
          # Tag looks like v1.2.3 — Helm SemVer wants 1.2.3 (no leading v).
          TAG: ${{ github.ref_name }}
          # OCI repository names must be lowercase; github.repository can carry
          # uppercase (e.g. DawnBreather/gitseal) which Helm rejects as invalid.
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          REPO_LC="$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin
          helm package charts/gitseal \
            --version "$VERSION" --app-version "$VERSION"
          helm push "gitseal-${VERSION}.tgz" \
            "oci://ghcr.io/${REPO_LC}/charts"
